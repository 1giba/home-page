services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - app_data:/app/.next
    environment:
      - CHOKIDAR_USEPOLLING=true
      - NEXT_DISABLE_TURBOPACK=1
      - NODE_ENV=development
    command: npm run dev
    stdin_open: true

volumes:
  app_data:
